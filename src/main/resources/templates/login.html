<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login – Family Help UAE</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --green: #1a6b4a;
        --green-dark: #145539;
        --green-light: #e8f5ee;
        --gray-bg: #f2f2f0;
        --border: #e0e0e0;
        --text: #1a1a1a;
        --muted: #888;
        --error: #c0392b;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: 'DM Sans', sans-serif;
        background: var(--gray-bg);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .logo {
        font-family: 'DM Serif Display', serif;
        font-size: 22px;
        color: var(--green);
        margin-bottom: 24px;
      }

      .card {
        background: #fff;
        border-radius: 20px;
        width: 100%;
        max-width: 460px;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.07);
        padding: 40px;
        animation: slideUp 0.4s ease;
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .card h2 {
        font-family: 'DM Serif Display', serif;
        font-size: 28px;
        color: var(--text);
        margin-bottom: 6px;
      }

      .card p.subtitle {
        font-size: 13px;
        color: var(--muted);
        margin-bottom: 32px;
      }

      .form-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-bottom: 20px;
      }

      .form-group label {
        font-size: 13px;
        font-weight: 600;
        color: #444;
      }

      .form-group input {
        padding: 13px 14px;
        border: 1.5px solid var(--border);
        border-radius: 10px;
        font-size: 14px;
        font-family: 'DM Sans', sans-serif;
        color: var(--text);
        outline: none;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }

      .form-group input:focus {
        border-color: var(--green);
        box-shadow: 0 0 0 3px rgba(26, 107, 74, 0.1);
      }

      .form-group input::placeholder {
        color: #bbb;
      }

      .field-error {
        font-size: 12px;
        color: var(--error);
      }

      .field-error::before {
        content: '⚠ ';
      }

      /* Forgot password */
      .label-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .label-row a {
        font-size: 12px;
        color: var(--green);
        text-decoration: none;
        font-weight: 500;
      }

      .label-row a:hover {
        text-decoration: underline;
      }

      /* Error alert */
      .alert-error {
        background: #fdf0ef;
        border: 1px solid #f5c6c2;
        border-radius: 10px;
        padding: 12px 16px;
        font-size: 13px;
        color: var(--error);
        margin-bottom: 20px;
      }

      /* Success alert (e.g. after registration) */
      .alert-success {
        background: var(--green-light);
        border: 1px solid #a8d5bc;
        border-radius: 10px;
        padding: 12px 16px;
        font-size: 13px;
        color: var(--green);
        margin-bottom: 20px;
      }

      .btn-login {
        width: 100%;
        background: var(--green);
        color: #fff;
        border: none;
        padding: 15px;
        border-radius: 50px;
        font-size: 15px;
        font-weight: 600;
        font-family: 'DM Sans', sans-serif;
        cursor: pointer;
        transition:
          background 0.2s,
          transform 0.1s;
        margin-top: 8px;
      }

      .btn-login:hover {
        background: var(--green-dark);
      }
      .btn-login:active {
        transform: scale(0.98);
      }

      /* Divider */
      .divider {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 24px 0;
        color: var(--muted);
        font-size: 12px;
      }

      .divider::before,
      .divider::after {
        content: '';
        flex: 1;
        height: 1px;
        background: var(--border);
      }

      /* Register link */
      .register-link {
        text-align: center;
        font-size: 13px;
        color: var(--muted);
        margin-top: 4px;
      }

      .register-link a {
        color: var(--green);
        text-decoration: none;
        font-weight: 600;
      }

      .register-link a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="logo">Family Help UAE</div>

    <div class="card">
      <h2>Welcome back</h2>
      <p class="subtitle">Sign in to your account to continue.</p>

      <!-- Success message after registration -->
      <div
        class="alert-success"
        th:if="${successMessage}"
        th:text="${successMessage}"
      ></div>

      <!-- Login error -->
      <div
        class="alert-error"
        th:if="${loginError}"
        th:text="${loginError}"
      ></div>

      <form th:action="@{/login}" th:object="${login}" method="post">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input
            type="email"
            name="email"
            th:field="*{email}"
            placeholder="ahmad@example.com"
          />
          <span
            class="field-error"
            th:if="${#fields.hasErrors('email')}"
            th:errors="*{email}"
          ></span>
        </div>

        <div class="form-group">
          <div class="label-row">
            <label for="password">Password</label>
            <a th:href="@{/forgot-password}">Forgot password?</a>
          </div>
          <input
            type="password"
            id="password"
            th:field="*{password}"
            placeholder="Enter your password"
          />
          <span
            class="field-error"
            th:if="${#fields.hasErrors('password')}"
            th:errors="*{password}"
          ></span>
        </div>

        <button type="submit" class="btn-login">Sign In</button>
      </form>

      <div class="divider">or</div>

      <p class="register-link">
        Don't have an account? <a th:href="@{/register}">Create one</a>
      </p>
    </div>
  </body>
</html>
