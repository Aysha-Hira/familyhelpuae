<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verify Account – Family Help UAE</title>

    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/register.css" />
  </head>

  <body>
    <div class="logo">Family Help UAE</div>

    <div class="card">
      <div class="form-body">
        <h2>Verify Your Account</h2>
        <p class="subtitle">
          Enter the verification code sent to your email/phone
        </p>

        <!-- Error message -->
        <div class="global-error" th:if="${error}" th:text="${error}"></div>

        <!-- Verification Form -->
        <form th:action="@{/register/verification}" method="post">
          <div class="form-group">
            <label for="code">Verification Code</label>

            <input
              type="text"
              id="code"
              name="code"
              maxlength="6"
              placeholder="Enter 6-digit code"
              required
            />
          </div>

          <div class="form-footer">
            <a th:href="@{/register}" class="btn-back">← Back</a>

            <button type="submit" class="btn-continue">Verify</button>
          </div>
        </form>

        <p class="signin-link" style="margin-top: 16px">
          Didn’t receive code?
          <a th:href="@{/register/resend}">Resend</a>
        </p>
      </div>
    </div>
  </body>
</html>
