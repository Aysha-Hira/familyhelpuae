<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pending Approval – Family Help UAE</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/register.css" />
    <style>
      .pending-wrap {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }
      .pending-card {
        background: #fff;
        border-radius: 1.25rem;
        box-shadow: 0 4px 32px rgba(0, 0, 0, 0.08);
        padding: 3rem 2.5rem;
        max-width: 480px;
        width: 100%;
        text-align: center;
      }
      .pending-icon {
        font-size: 3.5rem;
        margin-bottom: 1.25rem;
      }
      .pending-card h1 {
        font-family: 'DM Serif Display', serif;
        font-size: 1.75rem;
        margin-bottom: 0.75rem;
        color: #1a1a1a;
      }
      .pending-card p {
        color: #555;
        line-height: 1.6;
        margin-bottom: 1.5rem;
      }
      .btn-home {
        display: inline-block;
        padding: 0.75rem 2rem;
        background: #2e7d32;
        color: #fff;
        border-radius: 0.625rem;
        text-decoration: none;
        font-weight: 600;
        transition: background 0.2s;
      }
      .btn-home:hover {
        background: #1b5e20;
      }
    </style>
  </head>
  <body>
    <div class="pending-wrap">
      <div class="pending-card">
        <div class="pending-icon">⏳</div>
        <h1>Waiting for Approval</h1>
        <p>
          Your request to join the family has been sent to the family admin.
          You'll be able to log in once they approve your membership.
        </p>
        <p>
          Keep an eye on the email address you registered with — we'll let you
          know as soon as you're approved.
        </p>
        <a th:href="@{/}" href="/" class="btn-home">Back to Home</a>
      </div>
    </div>
  </body>
</html>
