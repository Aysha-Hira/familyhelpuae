<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password – Family Help UAE</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/register.css" />
    <style>
      .fp-wrap {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }
      .fp-card {
        background: #fff;
        border-radius: 1.25rem;
        box-shadow: 0 4px 32px rgba(0, 0, 0, 0.08);
        padding: 3rem 2.5rem;
        max-width: 440px;
        width: 100%;
      }
      .fp-card h1 {
        font-family: "DM Serif Display", serif;
        font-size: 1.75rem;
        margin-bottom: 0.5rem;
        color: #1a1a1a;
      }
      .fp-card p {
        color: #555;
        margin-bottom: 1.75rem;
        line-height: 1.6;
      }
      .form-group {
        margin-bottom: 1.25rem;
      }
      .form-group label {
        display: block;
        font-weight: 600;
        margin-bottom: 0.4rem;
        color: #333;
      }
      .form-group input {
        width: 100%;
        padding: 0.75rem 1rem;
        border: 1.5px solid #ddd;
        border-radius: 0.625rem;
        font-size: 1rem;
        font-family: inherit;
        box-sizing: border-box;
        transition: border-color 0.2s;
      }
      .form-group input:focus {
        outline: none;
        border-color: #2e7d32;
      }
      .btn-submit {
        width: 100%;
        padding: 0.85rem;
        background: #2e7d32;
        color: #fff;
        border: none;
        border-radius: 0.625rem;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
      }
      .btn-submit:hover {
        background: #1b5e20;
      }
      .back-link {
        text-align: center;
        margin-top: 1.25rem;
        font-size: 0.9rem;
        color: #555;
      }
      .back-link a {
        color: #2e7d32;
        text-decoration: none;
        font-weight: 600;
      }
      /* Success state */
      .sent-msg {
        display: none;
        background: #e8f5e9;
        border: 1.5px solid #a5d6a7;
        border-radius: 0.625rem;
        padding: 1rem 1.25rem;
        color: #2e7d32;
        font-weight: 500;
        margin-bottom: 1.25rem;
      }
    </style>
  </head>
  <body>
    <div class="fp-wrap">
      <div class="fp-card">
        <h1>Forgot your password?</h1>
        <p>
          Enter your registered email address and we'll send you a link to reset
          your password.
        </p>

        <!-- Shown after submit via JS; wire to a real email service when ready -->
        <div class="sent-msg" id="sentMsg">
          ✅ If that email is registered, a reset link is on its way. Check your
          inbox.
        </div>

        <!--
          TODO: wire this to a real POST /forgot-password endpoint that sends
          a password-reset email. For now the form is handled client-side only.
        -->
        <form id="fpForm">
          <div class="form-group">
            <label for="email">Email address</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="you@example.com"
              required
            />
          </div>
          <button type="submit" class="btn-submit">Send reset link</button>
        </form>

        <div class="back-link">
          Remembered it? <a th:href="@{/login}" href="/login">Sign in</a>
        </div>
      </div>
    </div>

    <script>
      document.getElementById('fpForm').addEventListener('submit', function (e) {
        e.preventDefault();
        // TODO: replace with a real fetch('/forgot-password', { method: 'POST', ... })
        document.getElementById('sentMsg').style.display = 'block';
        this.style.display = 'none';
      });
    </script>
  </body>
</html>
