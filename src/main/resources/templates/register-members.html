<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Members – Family Help UAE</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/register.css" />
  </head>
  <body>
    <div class="logo">Family Help UAE</div>

    <div class="card">
      <!-- Stepper -->
      <div class="stepper">
        <div class="step done">
          <div class="step-circle">✓</div>
          <span class="step-label">Personal</span>
        </div>
        <!-- <div class="step-line"></div>
        <div class="step inactive">
          <div class="step-circle">✓</div>
          <span class="step-label">Family</span>
        </div> -->
        <div class="step-line done"></div>
        <div class="step active">
          <div class="step-circle">3</div>
          <span class="step-label">Members</span>
        </div>
        <div class="step-line"></div>
        <div class="step inactive">
          <div class="step-circle">4</div>
          <span class="step-label">Verification</span>
        </div>
      </div>
      <div class="form-body">
        <form
          th:action="@{/register/members}"
          th:object="${register}"
          method="post"
        >
          <div id="members-container">
            <div class="member-card" th:each="rel, stat : *{relationships}">
              <!-- Member Type -->
              <div class="toggle-group">
                <input
                  type="radio"
                  th:name="'relationships[' + ${stat.index} + '].memberType'"
                  value="registered"
                  checked
                />
                <label>Registered User</label>

                <input
                  type="radio"
                  th:name="'relationships[' + ${stat.index} + '].memberType'"
                  value="nonregistered"
                />
                <label>Not on Platform</label>
              </div>

              <!-- Registered -->
              <div class="form-group">
                <label>User ID</label>

                <input
                  type="text"
                  th:field="*{relationships[__${stat.index}__].relatedUserId}"
                  placeholder="Enter User ID"
                />
              </div>

              <!-- Non-registered -->
              <div class="form-group">
                <label>Full Name</label>

                <input
                  type="text"
                  th:field="*{relationships[__${stat.index}__].relatedName}"
                  placeholder="Full Name"
                />
              </div>

              <div class="form-group">
                <label>Email</label>

                <input
                  type="email"
                  th:field="*{relationships[__${stat.index}__].relatedEmail}"
                  placeholder="Email"
                />
              </div>

              <!-- Relationship -->
              <div class="form-group">
                <label>Relationship</label>

                <select
                  th:field="*{relationships[__${stat.index}__].relationshipType}"
                >
                  <option value="">Select relationship...</option>
                  <option value="father">Father</option>
                  <option value="mother">Mother</option>
                  <option value="brother">Brother</option>
                  <option value="sister">Sister</option>
                  <option value="son">Son</option>
                  <option value="daughter">Daughter</option>
                  <option value="wife">Wife</option>
                  <option value="husband">Husband</option>
                </select>
              </div>

              <hr />
            </div>
          </div>

          <!-- Add Another -->
          <button type="button" onclick="addMember()">
            + Add Another Member
          </button>

          <div class="form-footer">
            <a th:href="@{/register/family}" class="btn-continue">← Back</a>

            <button type="submit" class="btn-continue">Continue</button>
          </div>
        </form>
      </div>
    </div>

    <script>
      function togglePanel(value) {
        document
          .getElementById('panel-registered')
          .classList.toggle('visible', value === 'registered');
        document
          .getElementById('panel-nonregistered')
          .classList.toggle('visible', value === 'nonregistered');
      }
    </script>
  </body>
</html>
