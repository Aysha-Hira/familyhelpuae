<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Family Profile – Family Help UAE</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/home.css" />
    <link rel="stylesheet" href="/css/familyprofile.css" />
  </head>
  <body>
    <!-- Sidebar (same as home) -->
    <aside class="sidebar">
      <div class="sidebar-logo">Family Help UAE</div>
      <nav class="sidebar-nav">
        <a href="/home" class="nav-item"
          ><span class="nav-icon">🏠</span> Home</a
        >
        <a href="/profile" class="nav-item"
          ><span class="nav-icon">👤</span> My Profile</a
        >
        <a href="/family" class="nav-item active"
          ><span class="nav-icon">👨‍👩‍👧‍👦</span> My Family</a
        >
        <a href="/request/new" class="nav-item"
          ><span class="nav-icon">🙋</span> Post Request</a
        >
        <a href="/offer/my-offers" class="nav-item"
          ><span class="nav-icon">🤝</span> Post Offer</a
        >
        <a href="/interactions" class="nav-item">
          <span class="nav-icon">📋</span> Interactions
        </a>

        <a href="/leaderboard" class="nav-item">
          <span class="nav-icon">🌟</span> Learderboard
        </a>
      </nav>
      <div class="sidebar-footer">
        <a href="/logout" class="nav-item logout"
          ><span class="nav-icon">🚪</span> Sign Out</a
        >
      </div>
    </aside>

    <main class="main">
      <!-- Family Header -->
      <div class="family-header">
        <div class="family-avatar" id="familyAvatar">👨‍👩‍👧‍👦</div>
        <div class="family-info">
          <h1 class="family-name" id="familyName">Loading...</h1>
          <div class="family-meta" id="familyMeta"></div>
          <div class="trust-score-wrap">
            <span class="trust-label">Trust Score</span>
            <span class="trust-value" id="trustScore">–</span>
            <div class="trust-bar">
              <div class="trust-fill" id="trustFill"></div>
            </div>
          </div>
        </div>
        <button class="btn-edit" onclick="toggleEdit()">Edit Family</button>
      </div>

      <!-- Edit Form (hidden by default) -->
      <div class="edit-panel" id="editPanel" style="display: none">
        <h3>Edit Family Details</h3>
        <div class="form-row">
          <div class="form-group">
            <label>Family Name</label>
            <input type="text" id="editName" />
          </div>
          <div class="form-group">
            <label>City</label>
            <input type="text" id="editCity" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>State / Emirate</label>
            <input type="text" id="editState" />
          </div>
          <div class="form-group">
            <label>Country</label>
            <input type="text" id="editCountry" />
          </div>
        </div>
        <div class="edit-actions">
          <button class="btn-save" onclick="saveFamily()">Save Changes</button>
          <button class="btn-cancel" onclick="toggleEdit()">Cancel</button>
        </div>
      </div>

      <!-- Members Section -->
      <div class="section">
        <div class="section-header">
          <h2 class="section-title">Family Members</h2>
          <button class="btn-add-member" onclick="showAddMember()">
            + Add Member
          </button>
        </div>

        <!-- Add Member Form (hidden) -->
        <div class="add-member-panel" id="addMemberPanel" style="display: none">
          <div class="form-row">
            <div class="form-group">
              <label>User ID</label>
              <input
                type="text"
                id="newMemberId"
                placeholder="Paste the user's ID"
              />
            </div>
            <div class="form-group">
              <label>Role</label>
              <select id="newMemberAdmin">
                <option value="false">Member</option>
                <option value="true">Admin</option>
              </select>
            </div>
          </div>
          <div class="edit-actions">
            <button class="btn-save" onclick="addMember()">Add</button>
            <button class="btn-cancel" onclick="hideAddMember()">Cancel</button>
          </div>
        </div>

        <div class="members-grid" id="membersGrid">
          <div class="loading">Loading members...</div>
        </div>
      </div>

      <!-- Requests Section -->
      <div class="section">
        <div class="section-header">
          <h2 class="section-title">Our Requests</h2>
          <a href="/request/new" class="btn-add-member">+ New Request</a>
        </div>
        <div class="requests-list" id="requestsList">
          <div class="loading">Loading requests...</div>
        </div>
      </div>
    </main>

    <script th:inline="javascript">
      const familyId = /*[[${familyId}]]*/ null;
    </script>
    <script>
      let familyData = null;

      async function loadFamily() {
        try {
          const res = await fetch(`/family/${familyId}`);
          familyData = await res.json();
          renderFamily(familyData);
        } catch (e) {
          document.getElementById('familyName').textContent =
            'Family not found';
        }
      }

      function renderFamily(f) {
        document.getElementById('familyName').textContent =
          f.familyName || 'Unnamed Family';
        document.getElementById('familyMeta').innerHTML =
          `<span>📍 ${[f.city, f.state, f.country].filter(Boolean).join(', ') || 'UAE'}</span>`;

        const score = f.familyTrustScore || 0;
        document.getElementById('trustScore').textContent = score.toFixed(1);
        document.getElementById('trustFill').style.width =
          `${Math.min(score * 20, 100)}%`;

        // Pre-fill edit form
        document.getElementById('editName').value = f.familyName || '';
        document.getElementById('editCity').value = f.city || '';
        document.getElementById('editState').value = f.state || '';
        document.getElementById('editCountry').value = f.country || '';

        renderMembers(f.members || []);
      }

      function renderMembers(members) {
        const grid = document.getElementById('membersGrid');
        if (!members.length) {
          grid.innerHTML = '<div class="empty-small">No members yet.</div>';
          return;
        }
        grid.innerHTML = members
          .map(
            (m) => `
          <div class="member-card">
            <div class="member-avatar">${m.isAdmin ? '👑' : '👤'}</div>
            <div class="member-info">
              <div class="member-id">${m.familyMemberId}</div>
              <div class="member-role">${m.isAdmin ? 'Admin' : 'Member'} · ${m.isUser ? 'Active' : 'Inactive'}</div>
            </div>
            <button class="btn-remove" onclick="removeMember('${m.familyMemberId}', ${m.isAdmin}, ${m.isUser})">✕</button>
          </div>
        `
          )
          .join('');
      }

      async function loadRequests() {
        try {
          const res = await fetch(`/request/family/${familyId}`);
          const requests = await res.json();
          const list = document.getElementById('requestsList');
          if (!requests.length) {
            list.innerHTML =
              '<div class="empty-small">No requests posted yet.</div>';
            return;
          }
          list.innerHTML = requests
            .map(
              (r) => `
            <div class="request-row" onclick="window.location='/request/${r.requestId}'">
              <div>
                <div class="rr-title">${r.requestTitle || 'Untitled'}</div>
                <div class="rr-meta">${r.requestType || ''} · ${r.urgencyLevel || ''}</div>
              </div>
              <span class="status-pill status-${r.requestStatus}">${r.requestStatus}</span>
            </div>
          `
            )
            .join('');
        } catch (e) {
          document.getElementById('requestsList').innerHTML =
            '<div class="empty-small">Could not load requests.</div>';
        }
      }

      function toggleEdit() {
        const panel = document.getElementById('editPanel');
        panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
      }

      async function saveFamily() {
        const body = {
          familyName: document.getElementById('editName').value,
          city: document.getElementById('editCity').value,
          state: document.getElementById('editState').value,
          country: document.getElementById('editCountry').value,
        };
        await fetch(`/family/update/${familyId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        toggleEdit();
        loadFamily();
      }

      function showAddMember() {
        document.getElementById('addMemberPanel').style.display = 'block';
      }
      function hideAddMember() {
        document.getElementById('addMemberPanel').style.display = 'none';
      }

      async function addMember() {
        const memberId = document.getElementById('newMemberId').value.trim();
        const isAdmin =
          document.getElementById('newMemberAdmin').value === 'true';
        if (!memberId) return;
        await fetch(`/family/${familyId}/members`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            familyMemberId: memberId,
            isAdmin,
            isUser: true,
          }),
        });
        hideAddMember();
        loadFamily();
      }

      async function removeMember(memberId, isAdmin, isUser) {
        if (!confirm('Remove this member?')) return;
        await fetch(`/family/${familyId}/members`, {
          method: 'DELETE',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ familyMemberId: memberId, isAdmin, isUser }),
        });
        loadFamily();
      }

      loadFamily();
      loadRequests();
    </script>
  </body>
</html>
